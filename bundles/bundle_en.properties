home.title=Hjson++ Wiki
home.description=This is wiki for Hjson++ modification (aka library). Here you can find information about all classes, fields and other stuff related to the mod.\n\nHow to add library requirement in your modification?\n1. Open your mod.hjson file (if you don't have it, create it in your mod's resources folder)\n2. Add this line to the file:\n\n\"dependencies\": [\n    \"hjsonpp\"\n]\n\n3. Now you can use all classes and fields from the library in your mod.\n\nHow to use this wiki?\n1. Use the sidebar to navigate through different classes.\n2. Click on class names to see detailed information about them.
