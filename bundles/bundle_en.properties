# region turrets

class.accel-item-turret.name =AccelItemTurret
class.accel-item-turret.description =A turret that speeds up every shot.
field.speed-up-per-shot =speedUpPerShot
notes.speed-up-per-shot =factor of speed up per shot 
field.max-accel =maxAccel
notes.max-accel =maximum speed up factor (aka 0.5 = +50% speed) 
