notes.cooldown-threshold =Temperature at which the turret will start to cool down.
field.cooldown-speed =cooldownSpeed
notes.cooldown-speed =Cooling down speed, when turret is inactive. (Example: 0.5f = 30°/sec.)
field.temperature-per-shot =temperaturePerShot
notes.temperature-per-shot =Temperature increase per shot.
field.overheat-cooldown-speed =overheatCooldownSpeed
notes.overheat-cooldown-speed =Cooling down speed, when turret is overheated. (Example: 0.5f = 30°/sec.)
field.cooldown =cooldown
