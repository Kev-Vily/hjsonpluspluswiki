class.overheat-turret.name =OverheatTurret
class.overheat-turret.description =A turret that can melt itself or overheat if you won't cool it down. melting and overheat are toggable options.
field.start-temperature =startTemperature
notes.start-temperature =Starting temperature of the turret.
field.overheat-temperature =overheatTemperature
notes.overheat-temperature =Temperature at which the turret will overheat.
field.melting-temperature =meltingTemperature
notes.melting-temperature =Temperature at which the turret will melt.
